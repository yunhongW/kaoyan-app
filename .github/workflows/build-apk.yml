name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK (wait for cloud build)
        run: eas build --platform android --profile preview --non-interactive --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Download APK
        run: |
          URL=$(eas build:list --platform android --limit 1 --status FINISHED --json --non-interactive 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'))[0]?.artifacts?.applicationArchiveUrl||''")
          echo "APK URL: $URL"
          if [ -n "$URL" ]; then
            curl -L -o kaoyan-app.apk "$URL"
            ls -lh kaoyan-app.apk
          else
            echo "ERROR: No APK URL found"
            eas build:list --platform android --limit 1 --status FINISHED --non-interactive
            exit 1
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kaoyan-app-apk
          path: "*.apk"
          retention-days: 30
