name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Submit EAS build
        run: |
          BUILD_OUTPUT=$(eas build --platform android --profile preview --non-interactive --json 2>&1)
          echo "$BUILD_OUTPUT"
          BUILD_ID=$(echo "$BUILD_OUTPUT" | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).id")
          echo "BUILD_ID=$BUILD_ID" >> $GITHUB_ENV
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Wait for build to finish
        run: |
          echo "Waiting for EAS build $BUILD_ID to complete..."
          for i in $(seq 1 60); do
            STATUS=$(eas build:view "$BUILD_ID" --json --non-interactive 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).status")
            echo "Build status: $STATUS (attempt $i)"
            if [ "$STATUS" = "FINISHED" ]; then
              echo "Build completed!"
              break
            elif [ "$STATUS" = "ERRORED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "Build failed with status: $STATUS"
              exit 1
            fi
            sleep 60
          done
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Download APK
        run: |
          URL=$(eas build:view "$BUILD_ID" --json --non-interactive 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).artifacts?.applicationArchiveUrl||''")
          echo "APK URL: $URL"
          if [ -n "$URL" ]; then
            curl -L -o kaoyan-app.apk "$URL"
            ls -lh kaoyan-app.apk
          else
            echo "ERROR: No APK URL found"
            eas build:view "$BUILD_ID" --json --non-interactive
            exit 1
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kaoyan-app-apk
          path: "*.apk"
          retention-days: 30
