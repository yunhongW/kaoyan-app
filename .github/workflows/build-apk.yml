name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Submit EAS build
        id: submit
        run: |
          OUTPUT=$(npx eas-cli build --platform android --profile preview --non-interactive 2>&1)
          echo "$OUTPUT"
          # Extract build URL from output (e.g. https://expo.dev/accounts/.../builds/xxx)
          BUILD_URL=$(echo "$OUTPUT" | grep -oE 'https://expo\.dev/accounts/[^ ]+/builds/[a-f0-9-]+' | head -1)
          echo "build_url=$BUILD_URL" >> $GITHUB_OUTPUT
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Wait for build completion
        run: |
          BUILD_URL="${{ steps.submit.outputs.build_url }}"
          echo "Build URL: $BUILD_URL"
          for i in $(seq 1 60); do
            INFO=$(npx eas-cli build:view "$BUILD_URL" --json --non-interactive 2>/dev/null || echo "{}")
            STATUS=$(echo "$INFO" | node -p "try{JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).status}catch(e){'UNKNOWN'}")
            echo "[$i] Status: $STATUS"
            if [ "$STATUS" = "FINISHED" ]; then
              APK_URL=$(echo "$INFO" | node -p "try{JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).artifacts?.applicationArchiveUrl||''}catch(e){''}")
              echo "Build finished!"
              echo "APK_URL=$APK_URL" >> $GITHUB_ENV
              exit 0
            elif [ "$STATUS" = "ERRORED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "Build failed: $STATUS"
              exit 1
            fi
            sleep 60
          done
          echo "Timeout waiting for build"
          exit 1
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Download APK
        run: |
          echo "Downloading: $APK_URL"
          curl -L -o kaoyan-app.apk "$APK_URL"
          ls -lh kaoyan-app.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kaoyan-app-apk
          path: "*.apk"
          retention-days: 30
