name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Submit EAS build and capture URL
        run: |
          eas build --platform android --profile preview --non-interactive 2>&1 | tee build-output.txt
          BUILD_URL=$(grep -oP 'https://expo\.dev/accounts/[^/]+/projects/[^/]+/builds/[a-z0-9-]+' build-output.txt | head -1)
          echo "BUILD_URL=$BUILD_URL" >> $GITHUB_ENV
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Wait for build to finish
        run: |
          echo "Build URL: $BUILD_URL"
          for i in $(seq 1 90); do
            JSON=$(eas build:list --platform android --limit 1 --status FINISHED --json --non-interactive 2>/dev/null)
            URL=$(echo "$JSON" | node -p "const j=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); (j[0]?.artifacts?.applicationArchiveUrl||'')")
            if [ -n "$URL" ]; then
              echo "Build finished! APK URL: $URL"
              echo "APK_URL=$URL" >> $GITHUB_ENV
              exit 0
            fi
            echo "Waiting... ($i/90)"
            sleep 60
          done
          echo "ERROR: Timeout waiting for build"
          exit 1
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Download APK
        run: |
          echo "Downloading from $APK_URL"
          curl -L -o kaoyan-app.apk "$APK_URL"
          ls -lh kaoyan-app.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kaoyan-app-apk
          path: "*.apk"
          retention-days: 30
